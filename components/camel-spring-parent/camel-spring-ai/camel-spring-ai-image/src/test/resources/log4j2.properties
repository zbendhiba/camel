appender.file.type = File
appender.file.name = file
appender.file.fileName = target/camel-spring-ai-image-test.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d [%-15.15t] %-5p %-30.30c{1} - %m%n

appender.out.type = Console
appender.out.name = out
appender.out.layout.type = PatternLayout
appender.out.layout.pattern = [%30.30t] %-30.30c{1} %-5p %m%n

rootLogger.level = INFO
rootLogger.appenderRef.file.ref = file

# Spring AI Image component
logger.springai-image.name = org.apache.camel.component.springai.image
logger.springai-image.level = DEBUG

# Spring AI OpenAI image model (request/response)
logger.openai-image.name = org.springframework.ai.openai.OpenAiImageModel
logger.openai-image.level = DEBUG

# Spring AI OpenAI image API (HTTP calls)
logger.openai-api.name = org.springframework.ai.openai.api.OpenAiImageApi
logger.openai-api.level = DEBUG

# Camel route processing
logger.camel.name = org.apache.camel
logger.camel.level = INFO

# Test class
logger.test.name = org.apache.camel.component.springai.image.SpringAiImageOllamaIT
logger.test.level = DEBUG
